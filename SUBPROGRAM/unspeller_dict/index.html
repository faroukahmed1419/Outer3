<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>القاموس التفاعلي - 3 ث</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
      background: #f4f7fb;
      color: #1e293b;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
      padding: 30px 25px 40px;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #0f172a;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      text-align: center;
      color: #64748b;
      margin-bottom: 30px;
      font-size: 1rem;
      border-bottom: 2px solid #e9edf2;
      padding-bottom: 18px;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 16px 20px;
      background: #f8fafc;
      padding: 20px 24px;
      border-radius: 20px;
      margin-bottom: 28px;
      align-items: flex-end;
      border: 1px solid #e2e8f0;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      flex: 1 1 180px;
      min-width: 150px;
    }

    .filter-group label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 5px;
    }

    .filter-group select,
    .filter-group input {
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid #d1d9e6;
      background: white;
      font-size: 0.95rem;
      color: #1e293b;
      transition: 0.2s;
      width: 100%;
      font-family: inherit;
    }

    .filter-group select:focus,
    .filter-group input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    .filter-group.search-box {
      flex: 2 1 260px;
    }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin: 10px 0 18px;
      padding: 0 6px;
    }

    .results-header h2 {
      font-size: 1.2rem;
      font-weight: 600;
      color: #1e293b;
    }

    .results-header .count-badge {
      background: #e9edf2;
      padding: 5px 16px;
      border-radius: 40px;
      font-size: 0.9rem;
      color: #334155;
      font-weight: 500;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    .card {
      background: #ffffff;
      border: 1px solid #eef2f6;
      border-radius: 16px;
      padding: 16px 18px;
      transition: 0.2s ease;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      border-color: #cbd5e1;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.04);
      transform: translateY(-2px);
    }

    .card .word {
      font-weight: 700;
      font-size: 1.1rem;
      color: #0f172a;
      margin-bottom: 4px;
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }

    .card .word .meta-tag {
      font-size: 0.65rem;
      font-weight: 600;
      color: #3b82f6;
      background: #e6f0ff;
      padding: 2px 10px;
      border-radius: 30px;
      letter-spacing: 0.2px;
    }

    .card .translation {
      font-size: 0.95rem;
      color: #334155;
      line-height: 1.6;
      word-break: break-word;
    }

    .card .extra-info {
      font-size: 0.85rem;
      color: #475569;
      background: #f8fafc;
      padding: 6px 12px;
      border-radius: 10px;
      margin-top: 8px;
      border-right: 3px solid #94a3b8;
    }

    .card .unit-tag {
      font-size: 0.7rem;
      color: #94a3b8;
      margin-top: 8px;
      border-top: 1px dashed #e2e8f0;
      padding-top: 8px;
      text-align: left;
    }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 50px 20px;
      color: #94a3b8;
      font-size: 1.1rem;
    }

    @media (max-width: 640px) {
      .container {
        padding: 16px 12px;
      }
      .filters {
        padding: 16px;
        gap: 12px;
      }
      .filter-group {
        flex: 1 1 100%;
        min-width: unset;
      }
      .cards-grid {
        grid-template-columns: 1fr;
      }
      h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>

    // ------------------------------------------------------------
    // المنطق الرئيسي للقاموس
    // ------------------------------------------------------------
    const unitSelect = document.getElementById('unitSelect');
    const categorySelect = document.getElementById('categorySelect');
    const searchInput = document.getElementById('searchInput');
    const resultsContainer = document.getElementById('resultsContainer');
    const resultCount = document.getElementById('resultCount');

    // تعيين خيارات الوحدات
    const unitKeys = Object.keys(data).sort((a,b) => Number(a) - Number(b));
    unitSelect.innerHTML = '<option value="all">جميع الوحدات</option>';
    unitKeys.forEach(key => {
      const opt = document.createElement('option');
      opt.value = key;
      opt.textContent = `Unit ${key}`;
      unitSelect.appendChild(opt);
    });

    // تعيين خيارات التصنيفات (ثابتة حسب الملف)
    const categoryMap = {
      'key_vocabulary': 'المفردات الرئيسية',
      'main_vocabulary': 'المفردات الأساسية',
      'phrases': 'العبارات والتعابير',
      'prepositions': 'حروف الجر',
      'derivatives': 'المشتقات',
      'synonyms_antonyms': 'المترادفات والمتضادات'
    };
    categorySelect.innerHTML = '<option value="all">جميع التصنيفات</option>';
    Object.entries(categoryMap).forEach(([key, label]) => {
      const opt = document.createElement('option');
      opt.value = key;
      opt.textContent = label;
      categorySelect.appendChild(opt);
    });

    function render() {
      const selectedUnit = unitSelect.value;
      const selectedCategory = categorySelect.value;
      const searchTerm = searchInput.value.trim().toLowerCase();

      let results = [];

      // تحديد الوحدات المراد البحث فيها
      const unitsToProcess = selectedUnit === 'all' ? unitKeys : [selectedUnit];

      unitsToProcess.forEach(unit => {
        if (!data[unit]) return;
        // تحديد التصنيفات
        const categoriesToProcess = selectedCategory === 'all' ? Object.keys(data[unit]) : [selectedCategory];

        categoriesToProcess.forEach(cat => {
          if (!data[unit][cat] || !Array.isArray(data[unit][cat])) return;
          data[unit][cat].forEach(item => {
            let word = item.word || '';
            let translation = item.translation || '';
            let extra = '';

            // تنسيق خاص بالمشتقات
            if (cat === 'derivatives' && item.type) {
              extra = ` (${item.type})`;
            }

            // تنسيق خاص بالمترادفات والمتضادات
            let synonymText = '';
            let antonymText = '';
            if (cat === 'synonyms_antonyms') {
              synonymText = item.synonym || '';
              antonymText = item.antonym || '';
              // نضعها في الترجمة مؤقتاً للبحث والعرض
              translation = `مرادف: ${synonymText} | مضاد: ${antonymText}`;
            }

            // بناء النص القابل للبحث
            const searchable = `${word} ${translation} ${synonymText} ${antonymText}`.toLowerCase();
            if (searchTerm && !searchable.includes(searchTerm)) return;

            results.push({
              unit: unit,
              category: cat,
              word: word,
              translation: translation,
              extra: extra,
              synonym: synonymText,
              antonym: antonymText,
              rawTranslation: item.translation || '' // للعرض النظيف
            });
          });
        });
      });

      // عرض النتائج
      if (results.length === 0) {
        resultsContainer.innerHTML = `<div class="no-results">😕 لا توجد نتائج مطابقة</div>`;
        resultCount.textContent = '0 كلمة';
        return;
      }

      let html = '';
      results.forEach(item => {
        let displayTranslation = item.translation;
        // إذا كانت مترادفات، نعرضها بشكل منسق
        if (item.category === 'synonyms_antonyms') {
          displayTranslation = `مرادف: ${item.synonym} &nbsp;|&nbsp; مضاد: ${item.antonym}`;
        }

        html += `
          <div class="card">
            <div class="word">
              ${item.word}
              ${item.extra ? `<span class="meta-tag">${item.extra}</span>` : ''}
              ${item.category === 'derivatives' ? `<span class="meta-tag">${item.word.includes(' ') ? 'عبارة' : 'كلمة'}</span>` : ''}
            </div>
            <div class="translation">${displayTranslation}</div>
            ${item.category === 'synonyms_antonyms' ? '' : ''}
            <div class="unit-tag">Unit ${item.unit} — ${categoryMap[item.category] || item.category}</div>
          </div>
        `;
      });

      resultsContainer.innerHTML = html;
      resultCount.textContent = `${results.length} كلمة`;
    }

    // ربط الأحداث
    unitSelect.addEventListener('change', render);
    categorySelect.addEventListener('change', render);
    searchInput.addEventListener('input', render);

    // العرض الأولي
    render();
  </script>
